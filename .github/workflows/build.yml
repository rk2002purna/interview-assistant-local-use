name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --include=optional
      - name: Verify native modules installed
        run: |
          echo "Checking for @lancedb native module..."
          dir node_modules\@lancedb\lancedb-win32-x64-msvc
          echo "Checking for apache-arrow..."
          dir node_modules\apache-arrow
          echo "Checking for @xenova/transformers..."
          dir node_modules\@xenova\transformers
          echo "Checking for pdfjs-dist..."
          dir node_modules\pdfjs-dist
      - run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --include=optional
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/*.zip
