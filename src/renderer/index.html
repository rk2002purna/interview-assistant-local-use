<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; color: #e2e8f0; user-select: none; height: 100vh; overflow: hidden; }
    #app { background: rgba(15,15,25,0.85); border: 1px solid rgba(99,179,237,0.15); border-radius: 14px; height: 100vh; display: flex; flex-direction: column; backdrop-filter: blur(8px); overflow: hidden; }
    #titlebar { -webkit-app-region: drag; background: transparent; padding: 8px 10px; display: flex; align-items: center; justify-content: flex-end; flex-shrink: 0; }
    .win-btns { -webkit-app-region: no-drag; display: flex; gap: 6px; }
    .win-btn { width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .win-btn:hover { opacity: 0.8; }
    .btn-close { background: #fc5c65; color: #7a0000; }
    .btn-min { background: #fed330; color: #7a5500; }
    .btn-set { background: #45aaf2; color: #003060; }
    #mode-toggle-bar { padding: 6px 14px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(99,179,237,0.1); flex-shrink: 0; }
    .mode-btn { padding: 4px 10px; border-radius: 14px; border: 1px solid rgba(99,179,237,0.2); background: rgba(99,179,237,0.08); color: #a0aec0; font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .mode-btn.active { background: rgba(72,187,120,0.25); border-color: rgba(72,187,120,0.5); color: #68d391; }
    .mode-btn:hover { opacity: 0.85; }
    #statusbar { padding: 7px 14px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); flex-shrink: 0; flex-wrap: wrap; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5568; transition: background 0.3s; }
    .status-dot.listening { background: #48bb78; animation: pulse 1.5s infinite; }
    .status-dot.thinking { background: #ed8936; animation: pulse 0.8s infinite; }
    .status-dot.passive { background: #9f7aea; animation: pulse 2s infinite; }
    .status-dot.screen-active { background: #4fd1c5; animation: pulse 2s infinite; }
    #status-text { font-size: 11px; color: #a0aec0; }
    #mic-btn { margin-left: auto; background: rgba(99,179,237,0.15); border: 1px solid rgba(99,179,237,0.3); color: #63b3ed; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; }
    #mic-btn:hover { background: rgba(99,179,237,0.25); }
    #mic-btn.active { background: rgba(252,92,101,0.2); border-color: rgba(252,92,101,0.4); color: #fc5c65; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .mode-indicator { display: none; padding: 8px 14px; flex-shrink: 0; }
    .mode-indicator.visible { display: block; }
    .mode-indicator .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .mode-indicator .info { font-size: 11px; line-height: 1.5; }
    #screen-indicator { background: rgba(79,209,197,0.08); border-bottom: 1px solid rgba(79,209,197,0.15); }
    #screen-indicator .label { color: #4fd1c5; }
    #screen-indicator .info { color: #81e6d9; }
    #transcript-box { padding: 0; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(99,179,237,0.1); flex-shrink: 0; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
    #transcript-box.visible { max-height: 120px; padding: 8px 14px; overflow-y: auto; }
    #transcript-box .label { font-size: 9px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    #transcript-text { font-size: 12px; color: #a0aec0; line-height: 1.5; font-style: italic; }
    #answer-wrap { flex: 1; overflow-y: auto; padding: 12px 14px; }
    #answer-wrap .label { font-size: 9px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    #answer-text { font-size: 13px; color: #e2e8f0; line-height: 1.7; white-space: pre-wrap; }
    #answer-text .thinking-dots { color: #ed8936; }
    #answer-text code { background: rgba(99,179,237,0.12); color: #90cdf4; padding: 1px 5px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; }
    #answer-text pre { background: rgba(0,0,0,0.4); border: 1px solid rgba(99,179,237,0.15); border-radius: 8px; padding: 10px; margin: 8px 0; overflow-x: auto; font-family: 'Courier New', monospace; font-size: 11px; color: #90cdf4; white-space: pre; }
    #input-area { padding: 10px 14px; border-top: 1px solid rgba(99,179,237,0.1); flex-shrink: 0; display: flex; gap: 8px; }
    #manual-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(99,179,237,0.2); border-radius: 8px; padding: 7px 10px; color: #e2e8f0; font-size: 12px; outline: none; resize: none; height: 34px; transition: border 0.2s; }
    #manual-input:focus { border-color: rgba(99,179,237,0.5); height: 60px; }
    #manual-input::placeholder { color: #4a5568; }
    #ask-btn { background: linear-gradient(135deg, #4299e1, #3182ce); border: none; color: white; padding: 0 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.2s; align-self: flex-end; height: 34px; }
    #ask-btn:hover { opacity: 0.85; }
    #api-warning { margin: 10px 14px; background: rgba(237,137,54,0.15); border: 1px solid rgba(237,137,54,0.3); border-radius: 8px; padding: 10px 12px; font-size: 11px; color: #fbd38d; display: none; }
    #api-warning a { color: #f6ad55; cursor: pointer; text-decoration: underline; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,179,237,0.2); border-radius: 2px; }
    #chat-history-btn { background: rgba(99,179,237,0.1); border: 1px solid rgba(99,179,237,0.2); color: #63b3ed; padding: 3px 10px; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: 600; }
    #chat-history-btn.active { background: rgba(99,179,237,0.3); border-color: rgba(99,179,237,0.5); }
    #clear-history-btn { background: transparent; border: none; color: #fc5c65; padding: 3px 8px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 600; }
    #chat-history-panel { display: none; flex-direction: column; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(99,179,237,0.1); max-height: 180px; overflow-y: auto; flex-shrink: 0; }
    #chat-history-panel.visible { display: flex; }
    .chat-item { padding: 8px 14px; border-bottom: 1px solid rgba(99,179,237,0.08); }
    .chat-q { font-size: 11px; color: #63b3ed; font-weight: 600; margin-bottom: 3px; }
    .chat-a { font-size: 11px; color: #a0aec0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .chat-empty { padding: 20px; text-align: center; color: #4a5568; font-size: 11px; }
    .hide-in-passive { transition: opacity 0.3s; }
    .passive-active .hide-in-passive, .screen-active .hide-in-passive { opacity: 0.3; pointer-events: none; max-height: 0; overflow: hidden; padding: 0; }

    /* Mini-mode floating yellow circle */
    #mini-restore-btn {
      display: none;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: none;
      background: #fed330;
      color: #7a5500;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #mini-restore-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 16px rgba(254,211,48,0.5);
    }
    body.mini-mode #app        { display: none !important; }
    body.mini-mode #mini-restore-btn { display: flex; }
    body.mini-mode             { background: transparent; overflow: hidden; }
  </style>
</head>
<body>
<button id="mini-restore-btn" onclick="restoreWindow()" title="Restore">&#9744;</button>
<div id="app">
  <div id="titlebar"><div class="win-btns">
    <button class="win-btn btn-set" onclick="openSettings()" title="Settings">&#9881;</button>
    <button class="win-btn btn-min" onclick="minimize()" title="Minimize">&minus;</button>
    <button class="win-btn btn-close" onclick="closeApp()" title="Close">&#10005;</button>
  </div></div>
  <div id="mode-toggle-bar">
    <button class="mode-btn active" id="manual-mode-btn" onclick="switchMode('manual')">&#127908; Manual</button>
    <button class="mode-btn" id="passive-mode-btn" onclick="switchMode('passive')">&#128065; Passive</button>
    <button class="mode-btn" id="screen-mode-btn" onclick="switchMode('screen')">&#128421; Screen Analyzer</button>
  </div>
  <div id="statusbar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
    <button id="chat-history-btn" onclick="toggleChatHistory()">&#128172; Memory</button>
    <button id="clear-history-btn" onclick="clearChatHistory()">Clear</button>
    <button id="mic-btn" onclick="toggleMic()">&#9654; Start</button>
  </div>
  <div id="screen-indicator" class="mode-indicator">
    <div class="label">Screen Analyzer</div>
    <div class="info">Scroll to each part of the question and click Capture. When done, click Analyze to get the answer.</div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <button id="capture-screen-btn" onclick="captureScreenshot()" style="flex:1; padding:10px; background:linear-gradient(135deg,#4fd1c5,#319795); border:none; color:white; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;">📸 Capture</button>
      <button id="analyze-screen-btn" onclick="analyzeScreenNow()" style="flex:1; padding:10px; background:linear-gradient(135deg,#ed8936,#dd6b20); border:none; color:white; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600;" disabled>🤖 Analyze (0)</button>
    </div>
    <button id="clear-captures-btn" onclick="clearCaptures()" style="margin-top:6px; width:100%; padding:6px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#a0aec0; border-radius:6px; cursor:pointer; font-size:11px;">🗑️ Clear captures</button>
  </div>
  <div id="chat-history-panel"><div id="chat-history-list"></div></div>
  <div id="api-warning">No API key set. <a onclick="openSettings()">Add your API key in Settings</a></div>
  <div id="transcript-box"><div class="label">Detected Question</div><div id="transcript-text"></div></div>
  <div id="answer-wrap"><div class="label">Answer</div><div id="answer-text">Select a mode to get started.</div></div>
  <div id="input-area" class="hide-in-passive">
    <textarea id="manual-input" placeholder="Type a question..." onkeydown="handleKey(event)"></textarea>
    <button id="ask-btn" onclick="askManual()">Ask</button>
  </div>
</div>

<script>
const { ipcRenderer } = require('electron');

// ===== STATE =====
let apiKey = '', deepseekApiKey = '', geminiApiKey = '', cerebrasApiKey = '';
let resumeContext = '', jobContext = '';
// Routing config - holds primary + fallback for text and vision
let routing = {
  textPrimary: { provider: 'gemini', model: 'gemini-flash-latest' },
  textFallback: { provider: 'groq', model: 'llama-3.3-70b-versatile' },
  visionPrimary: { provider: 'gemini', model: 'gemini-flash-latest' },
  visionFallback: { provider: 'groq', model: 'meta-llama/llama-4-scout-17b-16e-instruct' }
};
let conversationHistory = [], currentMode = 'manual', isListening = false;
var appPlatform = 'win32'; // updated on init via IPC
let mediaRecorder = null, audioContext = null, analyser = null, audioChunks = [], isProcessing = false, silenceDuration = 0, speechDetected = false;
let passiveStream = null, passiveRecorder = null, passiveAudioContext = null, passiveAnalyser = null, passiveChunks = [], passiveProcessing = false;
let passiveLevelHistory = [], passiveSpeaking = false, passiveSilenceFrames = 0, passiveSpeechFrames = 0, passiveBaseline = 0, passiveMonitorTimer = null, passiveActiveTranscriptions = 0;
let screenCaptureInterval = null, screenLastText = '', screenProcessing = false, screenStitcherBuffer = '', screenStitcherTimer = null, screenProcessedQuestions = [], screenCaptureIntervalMs = 4000;
const SILENCE_THRESHOLD_MS = 2500, MIN_AUDIO_SIZE = 500, SPEECH_VOLUME_THRESHOLD = 25;

// ===== INIT =====
async function init() {
  try { appPlatform = await ipcRenderer.invoke('get-platform'); } catch(e) {}
  await reloadConfig();
  loadChatHistory();
}

async function reloadConfig() {
  const config = await ipcRenderer.invoke('load-config');
  apiKey = config.apiKey || '';
  deepseekApiKey = config.deepseekApiKey || '';
  geminiApiKey = config.geminiApiKey || '';
  cerebrasApiKey = config.cerebrasApiKey || '';
  resumeContext = config.resumeContext || '';
  jobContext = config.jobContext || '';
  if (config.routing) {
    if (config.routing.textPrimary) routing.textPrimary = config.routing.textPrimary;
    if (config.routing.textFallback) routing.textFallback = config.routing.textFallback;
    if (config.routing.visionPrimary) routing.visionPrimary = config.routing.visionPrimary;
    if (config.routing.visionFallback) routing.visionFallback = config.routing.visionFallback;
  }
  if (config.screenCaptureInterval) screenCaptureIntervalMs = Math.max(1000, Math.min(10000, config.screenCaptureInterval * 1000));

  // Show warning if primary text provider has no key
  var primaryKey = getKeyForProvider(routing.textPrimary.provider);
  document.getElementById('api-warning').style.display = primaryKey ? 'none' : 'block';
}

// Build a system prompt with optional resume/job context that grounds the AI as the candidate
function buildSystemPrompt(basePrompt) {
  var contextBlock = '';
  if (resumeContext) {
    contextBlock += '\n\n=== YOUR BACKGROUND (you are this person) ===\n' + resumeContext;
  }
  if (jobContext) {
    contextBlock += '\n\n=== TARGET ROLE YOU ARE INTERVIEWING FOR ===\n' + jobContext;
  }
  if (contextBlock) {
    contextBlock += '\n\nCRITICAL: You ARE the candidate described above. Every answer must be in first person ("I", "my", "we"). ' +
      'Draw specific examples, projects, and technologies from YOUR background above. ' +
      'When asked about future goals, frame them around where YOUR actual skills and the target role intersect. ' +
      'Never talk about yourself as an AI or assistant — you are a human professional with the background listed above.';
  } else {
    contextBlock += '\n\nNOTE: No background context was provided. Answer as a realistic, experienced professional in first person. ' +
      'Never reveal that you are an AI — you are a human candidate in an interview. ' +
      'Use common industry experience that would be plausible for the role being discussed.';
  }
  return basePrompt + contextBlock;
}

function getKeyForProvider(provider) {
  if (provider === 'gemini') return geminiApiKey;
  if (provider === 'deepseek') return deepseekApiKey;
  if (provider === 'cerebras') return cerebrasApiKey;
  if (provider === 'groq') return apiKey;
  return '';
}

// ===== MODE SWITCHING =====
function switchMode(mode) {
  if (isListening) stopAllAudio();
  if (passiveStream) stopPassiveMode();
  if (screenCaptureInterval) stopScreenAnalyzer();
  currentMode = mode;
  var app = document.getElementById('app');
  app.classList.remove('passive-active', 'screen-active');
  document.getElementById('manual-mode-btn').classList.remove('active');
  document.getElementById('passive-mode-btn').classList.remove('active');
  document.getElementById('screen-mode-btn').classList.remove('active');
  document.getElementById('screen-indicator').classList.remove('visible');
  document.getElementById('mic-btn').style.display = '';
  if (mode === 'manual') {
    document.getElementById('manual-mode-btn').classList.add('active');
    setStatus('Manual mode - click Start');
  } else if (mode === 'passive') {
    app.classList.add('passive-active');
    document.getElementById('passive-mode-btn').classList.add('active');
    document.getElementById('mic-btn').style.display = 'none';
    setStatus('Starting passive audio capture...');
    startPassiveMode();
  } else if (mode === 'screen') {
    app.classList.add('screen-active');
    document.getElementById('screen-mode-btn').classList.add('active');
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('screen-indicator').classList.add('visible');
    setStatus('Initializing Screen Analyzer...');
    startScreenAnalyzer();
  }
}

// ===== SCREEN ANALYZER (Manual multi-capture mode) =====
var screenAnalyzing = false;
var capturedScreenshots = []; // stores base64 images

async function startScreenAnalyzer() {
  capturedScreenshots = [];
  updateCaptureCount();
  document.getElementById('status-dot').classList.add('screen-active');
  setStatus('Ready - Capture screenshots, then Analyze');
}

function stopScreenAnalyzer() {
  screenAnalyzing = false;
  capturedScreenshots = [];
  document.getElementById('status-dot').classList.remove('screen-active');
}

function updateCaptureCount() {
  var btn = document.getElementById('analyze-screen-btn');
  var count = capturedScreenshots.length;
  btn.innerHTML = '🤖 Analyze (' + count + ')';
  btn.disabled = count === 0;
}

function clearCaptures() {
  capturedScreenshots = [];
  updateCaptureCount();
  setStatus('Captures cleared - start fresh');
}

async function captureScreenshot() {
  var captureBtn = document.getElementById('capture-screen-btn');
  captureBtn.disabled = true;
  captureBtn.innerHTML = '⏳ Capturing...';
  setStatus('Capturing screen...');

  try {
    // Hide our window so it doesn't appear in screenshot
    ipcRenderer.send('hide-for-screenshot');
    await new Promise(function(r){ setTimeout(r, 300); });

    var capture = await ipcRenderer.invoke('capture-screen-frame');
    ipcRenderer.send('show-after-screenshot');

    if (capture.error) {
      setStatus('Capture failed: ' + capture.error);
      captureBtn.disabled = false;
      captureBtn.innerHTML = '📸 Capture';
      return;
    }

    // Store all screen images from this capture
    var images = capture.images || (capture.image ? [{ image: capture.image }] : []);
    for (var i = 0; i < images.length; i++) {
      capturedScreenshots.push(images[i].image);
    }

    // Free memory from capture object
    capture.image = null;
    capture.images = null;

    updateCaptureCount();
    setStatus(capturedScreenshots.length + ' screenshot(s) captured - scroll & capture more, or click Analyze');
  } catch (e) {
    ipcRenderer.send('show-after-screenshot');
    setStatus('Capture error: ' + e.message);
  }

  captureBtn.disabled = false;
  captureBtn.innerHTML = '📸 Capture';
}

async function analyzeScreenNow() {
  if (screenAnalyzing || capturedScreenshots.length === 0) return;

  // Check both vision providers' keys
  var visionPrimaryKey = getKeyForProvider(routing.visionPrimary.provider);
  var visionFallbackKey = routing.visionFallback && routing.visionFallback.provider ? getKeyForProvider(routing.visionFallback.provider) : '';
  if (!visionPrimaryKey && !visionFallbackKey) {
    document.getElementById('answer-text').textContent = 'No API key configured for vision. Add a key in Settings.';
    return;
  }

  screenAnalyzing = true;
  var analyzeBtn = document.getElementById('analyze-screen-btn');
  var captureBtn = document.getElementById('capture-screen-btn');
  analyzeBtn.disabled = true;
  captureBtn.disabled = true;
  analyzeBtn.innerHTML = '🤖 Analyzing...';

  var dot = document.getElementById('status-dot');
  dot.classList.remove('screen-active'); dot.classList.add('thinking');
  setStatus('Analyzing ' + capturedScreenshots.length + ' screenshot(s) with AI...');

  var answerEl = document.getElementById('answer-text');
  answerEl.innerHTML = '<span class="thinking-dots">Analyzing ' + capturedScreenshots.length + ' screenshot(s)...</span>';

  var systemPrompt = buildSystemPrompt('You are looking at screenshots from an interview or coding assessment. Treat ALL images as parts of the same question.\n\nRead everything — diagrams, code, tables, constraints, examples — and provide a practical answer.\n\nResponse format:\n\n### 🔍 What You\'re Looking At\nOne line summarizing the problem.\n\n### 🧠 Approach (talking points)\n- Key steps/algorithm in short bullet points the candidate can reference\n\n### 💻 Solution\n- Coding: complete, clean, working code in a code block\n- SQL: complete query\n- MCQ: correct option + brief reasoning\n- Math: steps + final answer\n- System design: explained clearly with key components\n\nKeep it practical — this is a live interview. The candidate needs to scan this fast.');

  // Build multi-image content (OpenAI-style; main.js converts to Gemini format if needed)
  var content = [];
  var count = capturedScreenshots.length;
  if (count === 1) {
    content.push({ type: 'text', text: 'Solve whatever is on this screen. Answer directly.' });
  } else {
    content.push({ type: 'text', text: 'These ' + count + ' screenshots are different parts of the same question (scrolled sections). Read all of them together and solve the complete problem. Answer directly.' });
  }
  for (var i = 0; i < count; i++) {
    content.push({
      type: 'image_url',
      image_url: { url: 'data:image/jpeg;base64,' + capturedScreenshots[i] }
    });
  }

  var streamed = '';
  var firstChunk = true;
  try {
    var data = await callAIStream(
      [{ role: 'user', content: content }],
      systemPrompt,
      function(delta) {
        if (firstChunk) { answerEl.innerHTML = ''; firstChunk = false; }
        streamed += delta;
        answerEl.innerHTML = renderAnswer(streamed);
      },
      'vision'
    );

    if (data.error) {
      answerEl.textContent = 'Error: ' + data.error.message;
    } else {
      var ans = (data.content && data.content[0] && data.content[0].text) || streamed;
      conversationHistory.push({ role: 'user', content: '[Screen analysis - ' + count + ' screenshot(s)]' });
      conversationHistory.push({ role: 'assistant', content: ans });
      saveChatHistory(); renderChatHistory();
      answerEl.innerHTML = renderAnswer(ans);
      setStatus('Answer ready - capture more or clear for next question');
    }
  } catch (e) {
    answerEl.textContent = 'Error: ' + e.message;
    setStatus('Error');
  }

  // Reset for next question
  capturedScreenshots = [];
  updateCaptureCount();
  dot.classList.remove('thinking'); dot.classList.add('screen-active');
  captureBtn.disabled = false;
  screenAnalyzing = false;
}

function textSimilarity(a, b) {
  if (a === b) return 1.0;
  if (!a || !b) return 0.0;
  var longer = a.length > b.length ? a : b;
  var shorter = a.length > b.length ? b : a;
  var matches = 0, ws = 50, total = Math.ceil(shorter.length / ws);
  for (var i = 0; i < shorter.length; i += ws) {
    if (longer.includes(shorter.substring(i, i + ws))) matches++;
  }
  return total > 0 ? matches / total : 0;
}

// ===== PASSIVE MODE =====
async function startPassiveMode() {
  // Detect platform once
  if (!appPlatform || appPlatform === 'win32') {
    try { appPlatform = await ipcRenderer.invoke('get-platform'); } catch(e) {}
  }

  // macOS: skip desktopCapturer audio (not supported) and try mic-based fallback first
  if (appPlatform === 'darwin') {
    setStatus('Starting passive mode (macOS)...');
    var ok = await startPassiveMacOS();
    if (!ok) {
      setStatus('macOS: install BlackHole or use a virtual audio driver for system audio. Falling back to microphone...');
      await startPassiveMic();
    }
    return;
  }

  // Windows / Linux: try desktopCapturer (system audio loopback)
  try {
    var sources = await ipcRenderer.invoke('get-desktop-sources');
    var src = sources.find(function(s){return s.name==='Entire Screen'||s.name==='Entire screen';}) || sources.find(function(s){return s.id.startsWith('screen:');}) || sources[0];
    if (!src) { setStatus('No screen source found'); return; }
    passiveStream = await navigator.mediaDevices.getUserMedia({ audio:{mandatory:{chromeMediaSource:'desktop'}}, video:{mandatory:{chromeMediaSource:'desktop',chromeMediaSourceId:src.id,minWidth:1,maxWidth:1,minHeight:1,maxHeight:1}} });
    passiveStream.getVideoTracks().forEach(function(t){t.stop();});
    var at = passiveStream.getAudioTracks();
    if (!at.length) { setStatus('No system audio'); await startPassiveFallback(); return; }
    var audioStream = new MediaStream(at);
    passiveStream = audioStream;
    passiveAudioContext = new AudioContext();
    passiveAnalyser = passiveAudioContext.createAnalyser();
    passiveAudioContext.createMediaStreamSource(audioStream).connect(passiveAnalyser);
    passiveAnalyser.fftSize = 256;
    startPassiveRecording(audioStream);
    document.getElementById('status-dot').classList.add('passive');
    setStatus('Passive listening active');
  } catch (e) { setStatus('Passive mode error: ' + e.message); await startPassiveFallback(); }
}

// macOS: try to find a virtual audio device (BlackHole/Loopback/etc)
async function startPassiveMacOS() {
  try {
    var devices = await navigator.mediaDevices.enumerateDevices();
    var audioInputs = devices.filter(function(d){return d.kind==='audioinput';});
    // Priority order: BlackHole first, then other virtual audio drivers
    var lb = audioInputs.find(function(d){

    passiveStream = await navigator.mediaDevices.getUserMedia({audio:{deviceId:{exact:lb.deviceId},echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    passiveAudioContext = new AudioContext();
    passiveAnalyser = passiveAudioContext.createAnalyser();

    startPassiveRecording(passiveStream);
    document.getElementById('status-dot').classList.add('passive');

  } catch(e) { return false; }
}

async function startPassiveFallback() {
  try {
    var devices = await navigator.mediaDevices.enumerateDevices();
    var audioInputs = devices.filter(function(d){return d.kind==='audioinput';});
    // Exclude Teams/Zoom virtual devices — they don't carry system audio
    var lb = audioInputs.find(function(d){
      var l = (d.label || '').toLowerCase();
      if (l.includes('teams') || l.includes('zoom')) return false;
      return l.includes('blackhole') || l.includes('stereo mix') || l.includes('cable') || l.includes('voicemeeter') || l.includes('loopback') || l.includes('soundflower');
    });
    if (lb) {
      passiveStream = await navigator.mediaDevices.getUserMedia({audio:{deviceId:{exact:lb.deviceId},echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      passiveAudioContext = new AudioContext(); passiveAnalyser = passiveAudioContext.createAnalyser();

// ===== Continuous passive recording with sliding-window VAD =====
// Strategy: keep recording continuously. Use volume monitoring to detect speech
// boundaries. When utterance ends, we stop the current recorder (so the WebM
// finalizes properly with full header+data) and immediately start a new one.
// This avoids chunk-slicing which breaks WebM container format.

let passiveRestartTimer = null;

function startPassiveRecording(stream) {
  passiveChunks = [];
  passiveSpeaking = false;
  passiveSilenceFrames = 0;
  passiveSpeechFrames = 0;
  passiveLevelHistory = [];
  passiveBaseline = 0;

  // Use higher bitrate (96 kbps) for better Whisper accuracy on system audio
  passiveRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 96000 });

  passiveRecorder.ondataavailable = function(e) {
    if (e.data.size > 0) passiveChunks.push(e.data);
  };

  passiveRecorder.onstop = function() {
    // Build complete WebM blob from all chunks gathered so far
    if (passiveChunks.length > 0 && passiveSpeaking) {
      var blob = new Blob(passiveChunks, { type: 'audio/webm' });
      passiveSpeaking = false;
      // Require ~600ms of audio minimum (filters out coughs, single syllables)
      if (blob.size > 4000) {
        processPassiveUtterance(blob);
      }
    }
    passiveChunks = [];
    // Restart recorder for next utterance
    if (currentMode === 'passive' && passiveStream) {
      passiveRestartTimer = setTimeout(function() {
        if (currentMode === 'passive' && passiveStream) {
          startPassiveRecording(passiveStream);
        }
      }, 100);
    }
  };

  passiveRecorder.start(250);
  monitorPassiveAudio();
}

function monitorPassiveAudio() {
  if (currentMode !== 'passive' || !passiveAnalyser) return;

  var d = new Uint8Array(passiveAnalyser.frequencyBinCount);
  passiveAnalyser.getByteFrequencyData(d);

  // Speech-band RMS level (90Hz - 2kHz)
  var sum = 0, count = 0;
  for (var i = 2; i < Math.min(40, d.length); i++) {
    sum += d[i] * d[i];
    count++;
  }
  var level = Math.sqrt(sum / count);

  passiveLevelHistory.push(level);
  if (passiveLevelHistory.length > 80) passiveLevelHistory.shift();

  if (passiveLevelHistory.length >= 20) {
    var sorted = passiveLevelHistory.slice().sort(function(a,b){return a-b;});
    passiveBaseline = sorted[Math.floor(sorted.length * 0.25)];
  }

  var threshold = Math.max(8, passiveBaseline * 1.6);
  var isSpeechFrame = level > threshold;

  if (isSpeechFrame) {
    passiveSpeechFrames++;
    passiveSilenceFrames = 0;

    if (!passiveSpeaking && passiveSpeechFrames >= 6) {
      passiveSpeaking = true;
      setStatus('🎤 Hearing speech...');
    }
  } else {
    passiveSilenceFrames++;
    passiveSpeechFrames = Math.max(0, passiveSpeechFrames - 1);

    // 1.2 sec of silence after speech → end of utterance (gives time for natural pauses)
    if (passiveSpeaking && passiveSilenceFrames >= 24) {
      // Stop recorder — onstop will build blob and restart
      if (passiveRecorder && passiveRecorder.state === 'recording') {
        passiveRecorder.stop();
      }
      return; // monitor will resume after recorder restart
    }
  }

  passiveMonitorTimer = setTimeout(monitorPassiveAudio, 50);
}

// Decide whether a transcribed utterance is worth answering.
// Returns true only if it looks like a real question / prompt.
function shouldAnswerUtterance(text) {
  if (!text) return false;
  var t = text.trim();
  if (t.length < 8) return false;

  // Strip punctuation, normalize whitespace
  var clean = t.toLowerCase().replace(/[^\w\s']/g, ' ').replace(/\s+/g, ' ').trim();
  if (!clean) return false;

  var words = clean.split(' ').filter(function(w){ return w.length > 0; });
  if (words.length < 3) return false; // require at least 3 words

  // Common filler-only / non-content utterances to ignore
  var fillerSet = {
    'um':1,'uh':1,'hmm':1,'mhm':1,'huh':1,'hm':1,'mm':1,'er':1,'ah':1,'oh':1,
    'yeah':1,'yes':1,'no':1,'ok':1,'okay':1,'right':1,'sure':1,'cool':1,'nice':1,
    'thanks':1,'thank':1,'you':1,'i':1,'a':1,'the':1,'and':1,'so':1,'well':1,
    'like':1,'just':1,'really':1,'just':1,'one':1,'second':1
  };

  // Count meaningful (non-filler) words
  var meaningful = 0;
  for (var i = 0; i < words.length; i++) {
    if (!fillerSet[words[i]]) meaningful++;
  }
  if (meaningful < 3) return false; // need 3+ real content words

  // Block known Whisper hallucinations on silence/cough
  var halluc = [
    'thank you', 'thank you.', 'thanks for watching', 'thanks for watching.',
    'thank you for watching', 'thank you for watching.', '.', 'you', 'bye',
    'subscribe', 'please subscribe', 'thanks', 'okay', 'all right', 'mm-hmm',
    'mhm', 'uh-huh', 'm-hm', 'ahem'
  ];
  var lower = t.toLowerCase().replace(/[.!?]+$/, '').trim();
  for (var j = 0; j < halluc.length; j++) {
    if (lower === halluc[j]) return false;
  }

  // Block utterances that are mostly filler repetitions ("hmm hmm hmm", "yeah yeah yeah")
  var unique = {};
  for (var k = 0; k < words.length; k++) unique[words[k]] = 1;
  var uniqueCount = Object.keys(unique).length;
  if (uniqueCount <= 2 && words.length >= 3) return false;

  return true;
}

async function processPassiveUtterance(blob) {
  if (passiveActiveTranscriptions >= 2) return;
  passiveActiveTranscriptions++;

  setStatus('🎙️ Transcribing... (listening continues)');

  try {
    var b64 = await blobToBase64(blob);
    var r = await ipcRenderer.invoke('transcribe-audio', { apiKey: apiKey, audioData: b64 });

    if (r.error) {
      setStatus('Transcription error: ' + (r.error.message || 'unknown'));
      passiveActiveTranscriptions--;
      return;
    }

    if (r.text && r.text.trim()) {
      var t = r.text.trim();

      if (!shouldAnswerUtterance(t)) {
        if (currentMode === 'passive') setStatus('🎤 Listening... (ignored: too short / filler)');
        passiveActiveTranscriptions--;
        return;
      }

      document.getElementById('transcript-text').textContent = t;
      document.getElementById('transcript-box').classList.add('visible');
      await askQuestion(t);
      setTimeout(function() {
        document.getElementById('transcript-box').classList.remove('visible');
      }, 10000);
    } else {
      if (currentMode === 'passive') setStatus('🎤 Listening...');
    }
  } catch (e) {
    if (currentMode === 'passive') setStatus('🎤 Listening...');
  }

  passiveActiveTranscriptions--;
}

function stopPassiveMode() {
  if (passiveMonitorTimer) { clearTimeout(passiveMonitorTimer); passiveMonitorTimer = null; }
  if (passiveRestartTimer) { clearTimeout(passiveRestartTimer); passiveRestartTimer = null; }
  if (passiveRecorder && passiveRecorder.state !== 'inactive') {
    try { passiveRecorder.stop(); } catch(e) {}
  }
  if (passiveStream) { passiveStream.getTracks().forEach(function(t){t.stop();}); passiveStream = null; }
  if (passiveAudioContext) { try { passiveAudioContext.close(); } catch(e){} passiveAudioContext = null; }
  passiveAnalyser = null;
  passiveProcessing = false;
  passiveSpeaking = false;
  passiveActiveTranscriptions = 0;
  passiveChunks = [];
  passiveLevelHistory = [];
  document.getElementById('status-dot').classList.remove('passive');
}
function blobToBase64(blob){return new Promise(function(resolve){var r=new FileReader();r.onloadend=function(){resolve(r.result.split(',')[1]);};r.readAsDataURL(blob);});}

// ===== MANUAL MODE =====
async function startAudioRecording(){try{var stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});audioContext=new AudioContext();analyser=audioContext.createAnalyser();audioContext.createMediaStreamSource(stream).connect(analyser);analyser.fftSize=256;mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});audioChunks=[];silenceDuration=0;speechDetected=false;isProcessing=false;mediaRecorder.ondataavailable=function(e){if(e.data.size>0)audioChunks.push(e.data);};mediaRecorder.onstop=async function(){if(isProcessing)return;var blob=new Blob(audioChunks,{type:'audio/webm'});stream.getTracks().forEach(function(t){t.stop();});if(blob.size>MIN_AUDIO_SIZE)await processManualAudio(blob);else if(isListening&&!isProcessing)setTimeout(startAudioRecording,500);};mediaRecorder.start(500);monitorManualAudio();setStatus('Listening...');return true;}catch(e){setStatus('Audio error: '+e.message);return false;}}
function monitorManualAudio(){if(!isListening||isProcessing||!analyser)return;var d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(d);var sum=0;for(var i=0;i<d.length;i++)sum+=d[i];if(sum/d.length>30){speechDetected=true;silenceDuration=0;}else if(speechDetected){silenceDuration+=100;if(silenceDuration>=SILENCE_THRESHOLD_MS&&!isProcessing){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();return;}}if(isListening&&!isProcessing)setTimeout(monitorManualAudio,100);}
async function processManualAudio(blob){
  isProcessing=true;
  setStatus('Processing...');
  if (!apiKey) {
    setStatus('Groq API key required for voice transcription. Add it in Settings.');
    isProcessing=false;
    if(isListening){setTimeout(function(){if(isListening&&!isProcessing)startAudioRecording();},2000);}
    return;
  }
  var b64=await blobToBase64(blob);
  var r=await ipcRenderer.invoke('transcribe-audio',{apiKey:apiKey,audioData:b64});
  if(r.error){
    setStatus('Transcription error: '+(r.error.message||'unknown'));
  } else if(r.text&&r.text.trim()){
    document.getElementById('transcript-text').textContent=r.text;
    document.getElementById('transcript-box').classList.add('visible');
    await askQuestion(r.text.trim());
    setTimeout(function(){document.getElementById('transcript-box').classList.remove('visible');},8000);
  } else {
    setStatus('No speech detected');
  }
  isProcessing=false;
  if(isListening){
    audioChunks=[];silenceDuration=0;speechDetected=false;
    setTimeout(function(){if(isListening&&!isProcessing)startAudioRecording();},1000);
  }
}
function stopAllAudio(){isListening=false;isProcessing=false;if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();if(audioContext){audioContext.close();audioContext=null;}analyser=null;document.getElementById('mic-btn').textContent='\u25B6 Start';document.getElementById('mic-btn').classList.remove('active');document.getElementById('status-dot').classList.remove('listening');setStatus('Stopped');}
async function toggleMic(){if(isListening){stopAllAudio();}else{var ok=await startAudioRecording();if(!ok)return;isListening=true;document.getElementById('mic-btn').textContent='\u23F9 Stop';document.getElementById('mic-btn').classList.add('active');document.getElementById('status-dot').classList.add('listening');}}

// ===== AI (shared) =====
// Try primary, then fallback if primary errors. Streams tokens via onDelta.
async function callAIStream(messages, systemPrompt, onDelta, target) {
  // target = 'text' or 'vision'
  var primary = target === 'vision' ? routing.visionPrimary : routing.textPrimary;
  var fallback = target === 'vision' ? routing.visionFallback : routing.textFallback;

  // Try primary
  var primaryKey = getKeyForProvider(primary.provider);
  if (primaryKey && primary.model) {
    var result = await invokeProviderStream(primary.provider, primaryKey, primary.model, messages, systemPrompt, onDelta);
    if (!result.error) return result;
    // Primary failed — log and try fallback if configured
    console.warn('Primary failed:', result.error.message);
    if (!fallback || !fallback.provider || !fallback.model) return result;

    var fallbackKey = getKeyForProvider(fallback.provider);
    if (!fallbackKey) {
      return { error: { message: 'Primary failed (' + result.error.message + '). Fallback ' + fallback.provider + ' has no API key.' } };
    }

    setStatus('Primary failed, trying fallback (' + fallback.provider + ')...');
    var fallbackResult = await invokeProviderStream(fallback.provider, fallbackKey, fallback.model, messages, systemPrompt, onDelta);
    if (fallbackResult.error) {
      return { error: { message: 'Both primary and fallback failed. Primary: ' + result.error.message + '. Fallback: ' + fallbackResult.error.message } };
    }
    return fallbackResult;
  }

  // No primary key — try fallback directly
  if (fallback && fallback.provider && fallback.model) {
    var fbKey = getKeyForProvider(fallback.provider);
    if (fbKey) {
      return await invokeProviderStream(fallback.provider, fbKey, fallback.model, messages, systemPrompt, onDelta);
    }
  }

  return { error: { message: 'No API key configured for ' + primary.provider + ' (primary). Add a key in Settings.' } };
}

async function invokeProviderStream(provider, key, model, messages, systemPrompt, onDelta) {
  var streamId = 'stream_' + Date.now() + '_' + Math.random();
  var listener = function(e, payload) {
    if (payload && payload.streamId === streamId && payload.delta) {
      onDelta(payload.delta);
    }
  };
  ipcRenderer.on('ai-stream-chunk', listener);
  try {
    var result = await ipcRenderer.invoke('call-ai-stream', {
      provider: provider, apiKey: key, model: model,
      messages: messages, systemPrompt: systemPrompt, streamId: streamId
    });
    return result;
  } finally {
    ipcRenderer.removeListener('ai-stream-chunk', listener);
  }
}

function getActiveApiKey() {
  // For UI gates — returns primary text key
  return getKeyForProvider(routing.textPrimary.provider);
}

async function askQuestion(question){
  if(!getActiveApiKey() && !getKeyForProvider((routing.textFallback||{}).provider)){
    document.getElementById('answer-text').textContent='Add API key in Settings';return;
  }
  var dot=document.getElementById('status-dot');dot.classList.remove('listening','passive','screen-active');dot.classList.add('thinking');setStatus('Getting answer...');
  var el=document.getElementById('answer-text');el.innerHTML='<span class="thinking-dots">Thinking...</span>';
  conversationHistory.push({role:'user',content:question});saveChatHistory();
  var streamed='';
  var firstChunk=true;
  try{
    var data=await callAIStream(conversationHistory.slice(-6),
      buildSystemPrompt(`You are a job candidate in a live interview. You must answer the interviewer's questions in first person as a real human professional — never break character.

HOW TO ANSWER:

1. SPEAK LIKE A REAL PERSON
   - Use natural conversational English with contractions (I'm, I'd, I've, that's, it's)
   - Vary your sentence length — mix short direct statements with longer explanations
   - Show personality: confidence, curiosity, honesty. Real people don't sound like press releases.
   - NEVER start with filler preambles — no "Sure!", "Great question!", "Let me walk you through...", "That's a great question." Just answer the question directly.
   - NEVER use phrases like "one must consider", "it is noteworthy", "I shall endeavor" — that's AI-speak
   - DO NOT number your points out loud, use headings, or structure your answer with labels — just speak naturally

2. STRUCTURE YOUR ANSWER NATURALLY
   - Open with a direct response to the question (1-2 sentences)
   - Back it up with a concrete example or story from your background (2-4 sentences)
   - Connect it to why this matters for the role you're interviewing for (1-2 sentences)
   - End with a brief wrap-up that shows reflection

3. FOR BEHAVIORAL QUESTIONS (tell me about a time, how do you handle, etc.)
   - Tell a genuine story with a beginning, middle, and end
   - Include: what happened → what YOU specifically did → what you learned
   - Be honest about challenges — perfect stories sound fake

4. FOR TECHNICAL QUESTIONS
   - Define the concept clearly in your own words first
   - Explain with a practical example from your actual experience
   - If you don't know something: admit it honestly and explain how you'd figure it out

5. FOR "FUTURE GOALS" QUESTIONS (where do you see yourself, 3 years, 5 years, etc.)
   - Anchor your answer in YOUR actual skills and the target role
   - Show ambition but be realistic: growth in skills, scope, impact — not "I want to be CEO"
   - Mention specific technologies or domains from your background you want to deepen

6. FOR CODING QUESTIONS
   - Walk through your approach first in plain language
   - Then provide clean, working code in a code block

CRITICAL: You ARE the candidate, not an AI. Never mention being an AI, assistant, or language model.
Answer elaborately — this is a real interview, not a chatbot. Give full, thoughtful answers.`),
      function(delta){
        if(firstChunk){ el.innerHTML=''; firstChunk=false; setStatus('Answering...'); }
        streamed+=delta;
        el.innerHTML=renderAnswer(streamed);
      },
      'text'
    );
    if(data.error){el.textContent='Error: '+data.error.message;}
    else{
      var ans=data.content[0].text || streamed;
      conversationHistory.push({role:'assistant',content:ans});saveChatHistory();renderChatHistory();
      el.innerHTML=renderAnswer(ans);
    }
  }catch(e){el.textContent='Network error: '+e.message;}
  dot.classList.remove('thinking');restoreStatusDot();setStatus(currentMode==='passive'?'Passive listening...':currentMode==='screen'?'Screen monitoring...':(isListening?'Listening...':'Ready'));
}
function restoreStatusDot(){var dot=document.getElementById('status-dot');if(currentMode==='passive')dot.classList.add('passive');else if(currentMode==='screen')dot.classList.add('screen-active');else if(isListening)dot.classList.add('listening');}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();askManual();}}
function askManual(){var input=document.getElementById('manual-input');var q=input.value.trim();if(!q)return;input.value='';document.getElementById('transcript-text').textContent=q;document.getElementById('transcript-box').classList.add('visible');askQuestion(q);setTimeout(function(){document.getElementById('transcript-box').classList.remove('visible');},8000);}
function renderAnswer(text){return text.replace(/```(\w*)\n?([\s\S]*?)```/g,function(_,l,c){return '<pre>'+escapeHtml(c.trim())+'</pre>';}).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
